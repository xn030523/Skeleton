# Skeleton Configuration
# Copy to your project directory or ~/.skeleton/config.yaml

llm:
  protocol: openai      # openai | anthropic
  # apiKey: sk-...      # Or set SKELETON_API_KEY
  # baseUrl: https://api.openai.com
  # model: gpt-4o
  maxTokens: 4096
  temperature: 0.3

# fallback:              # Optional fallback LLM
#   protocol: anthropic
#   apiKey: sk-ant-...
#   model: claude-sonnet-4-20250514

agent:
  maxTurns: 20
  # systemPrompt: "Custom system prompt..."

# ─── Skills ───
# CTF knowledge base (solve-challenge orchestrator + 11 category workflows)
# Enabled by default. Set to false to disable.
skills:
  ctf: true

# ─── Built-in Tools ───
# 7 RE tools: identify, hexdump, strings, pe_info, elf_info, entropy, disassemble
# Enabled by default. Use builtinList to select specific tools.
# tools:
#   builtin: true
#   builtinList:
#     - identify
#     - hexdump
#     - strings
#     - pe_info
#     - elf_info
#     - entropy

# ─── MCP Servers ───
# All built-in MCP servers are DISABLED by default.
# Enable a server by either:
#   1. Listing it under mcp.servers (also allows config override)
#   2. Setting its env enable flag to "true" (e.g. SKELETON_MCP_GHIDRA=true)
#
# When enabling via yaml, you can provide required env vars and override defaults.
# Servers requiring API keys or paths MUST have those configured.

mcp:
  servers: {}

