# ============================================================================
# Environment Variables
# ============================================================================

# API keys are stored in ~/.skeleton/.env (auto-generated by `skeleton setup`)
# Example .env content:
#   DEEPSEEK_API_KEY=sk-xxx
#   ANTHROPIC_API_KEY=sk-ant-xxx
#   OPENAI_API_KEY=sk-xxx

# You can also use environment variables directly:
#   export SKELETON_PROVIDER=deepseek
#   export DEEPSEEK_API_KEY=sk-xxx

# Config values support ${VAR} substitution:
#   llm:
#     provider: ${MY_PROVIDER:-deepseek}
#     model: ${MY_MODEL:-deepseek-chat}
