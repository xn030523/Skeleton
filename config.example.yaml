# Skeleton Configuration Example
# Copy to ~/.skeleton/config.yaml and customize

# ============================================================================
# LLM Configuration (Provider-based)
# ============================================================================

llm:
  # Provider name (auto-resolves baseUrl, apiKey env var, default model)
  provider: deepseek

  # Optional: override default model
  model: deepseek-chat

  # Optional: override defaults (usually not needed)
  # maxTokens: 4096
  # temperature: 0.3

# Optional: Fallback provider (used if primary fails)
fallback:
  provider: anthropic
  model: claude-sonnet-4-20250514

# ============================================================================
# Agent Behavior
# ============================================================================

agent:
  maxTurns: 90
  systemPrompt: "You are Skeleton, a reverse engineering AI assistant."

# ============================================================================
# Context Compression (NEW in Phase 5)
# ============================================================================

compression:
  # Enable automatic compression when context usage exceeds threshold
  enabled: true

  # Trigger compression when context usage exceeds this ratio (0.0-1.0)
  # 0.50 = compress when 50% of context window is used
  threshold: 0.50

  # After compression, keep this ratio of messages (0.0-1.0)
  # 0.20 = compress down to 20% of threshold
  targetRatio: 0.20

  # Always protect the most recent N messages from compression
  protectLastN: 20

  # Tool output truncation thresholds (characters)
  toolOutputThreshold: 2000
  toolOutputHead: 800
  toolOutputTail: 400

# ============================================================================
# Tools
# ============================================================================

tools:
  builtin: true
  # builtinList: ["read_file", "write_file", "terminal"]

# ============================================================================
# MCP Servers
# ============================================================================

mcp:
  servers:
    filesystem:
      enabled: true
    # Add more MCP servers here

# ============================================================================
# Skills
# ============================================================================

skills:
  ctf: true  # Enable CTF skills (auto | true | false)

# ============================================================================
# Available Providers
# ============================================================================

# Major Cloud Providers:
#   - openai (aliases: gpt)
#   - anthropic (aliases: claude)
#   - gemini (aliases: google)
#   - azure-foundry (aliases: azure)

# Chinese Providers:
#   - deepseek
