<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B8860B"/>
      <stop offset="40%" style="stop-color:#FFD700"/>
      <stop offset="60%" style="stop-color:#FFC107"/>
      <stop offset="100%" style="stop-color:#B8860B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <text x="400" y="130" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="100" font-weight="800" fill="url(#g)" filter="url(#glow)"
    text-anchor="middle" letter-spacing="8">Skeleton</text>
</svg>
